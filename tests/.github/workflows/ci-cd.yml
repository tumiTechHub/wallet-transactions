# ============================================================
# MeridianPay — wallet-transactions CI/CD Pipeline
# ============================================================

name: ci-cd-pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  security-events: write

jobs:

  # ── JOB 1: Lint + Unit Tests ──────────────────────────────
  lint-and-test:
    name: "Lint + Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check . --output-format=github

      - name: Run unit tests with coverage
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 90

  # ── JOB 2: Security Gates ────────────────────────────────
  security-scan:
    name: "Security Gates"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: SAST scan (Bandit)
        run: bandit -r app.py --severity-level medium

      - name: Dependency vulnerability scan (Safety)
        run: safety check -r requirements.txt --full-report

      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 90

  # ── JOB 3: Integration Tests ──────────────────────────────
  integration-test:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests

      - name: Start wallet-transactions API
        run: |
          python app.py &
          sleep 3

      - name: Run integration tests against live API
        run: |
          python -c "
          import requests

          BASE = 'http://localhost:5000'

          r = requests.get(f'{BASE}/health')
          assert r.status_code == 200
          print('PASS: Health check')

          r = requests.get(f'{BASE}/wallets/wallet-001')
          assert r.status_code == 200
          assert r.json()['balance'] == 5000.0
          print('PASS: Get wallet balance')

          r = requests.post(f'{BASE}/wallets/wallet-001/transactions',
              json={'type': 'credit', 'amount': 200.0, 'description': 'Test credit'})
          assert r.status_code == 201
          print('PASS: Credit transaction')

          r = requests.post(f'{BASE}/wallets/wallet-001/transactions',
              json={'type': 'debit', 'amount': 100.0, 'description': 'Test debit'})
          assert r.status_code == 201
          print('PASS: Debit transaction')

          r = requests.post(f'{BASE}/wallets/wallet-001/transactions',
              json={'type': 'debit', 'amount': 999999.0})
          assert r.status_code == 422
          print('PASS: Insufficient funds guard')

          r = requests.get(f'{BASE}/wallets/wallet-001/summary')
          assert r.status_code == 200
          print('PASS: Wallet summary')

          r = requests.get(f'{BASE}/wallets/wallet-UNKNOWN')
          assert r.status_code == 404
          print('PASS: 404 for unknown wallet')

          print('All integration tests passed!')
          "

  # ── JOB 4: Build and Package ──────────────────────────────
  build-and-package:
    name: "Build and Package"
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies into dist folder
        run: |
          pip install --upgrade pip
          mkdir -p dist
          pip install -r requirements.txt --target dist/
          cp app.py dist/
          cp requirements.txt dist/

      - name: Generate SHA-256 manifest
        run: |
          find dist -type f -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create versioned build artefact
        run: |
          zip -r "wallet-transactions-build.zip" dist/ SHA256SUMS.txt

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: wallet-transactions-build
          path: |
            wallet-transactions-build.zip
            SHA256SUMS.txt
          retention-days: 90
