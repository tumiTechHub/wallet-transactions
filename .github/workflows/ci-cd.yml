name: ci-cd-pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:

  lint-and-test:
    name: "Lint + Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flask pytest pytest-cov ruff

      - name: Lint
        run: ruff check . --output-format=github

      - name: Unit tests
        run: |
          pytest tests/ -v --cov=app --cov-report=xml:coverage.xml --cov-fail-under=80

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security-scan:
    name: "Security Gates"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit safety

      - name: SAST scan
        run: bandit -r app.py --severity-level medium

      - name: Dependency scan
        run: safety check -r requirements.txt

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration-test:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask requests

      - name: Start API
        run: python app.py &

      - name: Wait for startup
        run: sleep 3

      - name: Run integration tests
        run: |
          python -c "
          import requests
          BASE = 'http://localhost:5000'
          r = requests.get(f'{BASE}/health')
          assert r.status_code == 200
          print('PASS: health')
          r = requests.get(f'{BASE}/wallets/wallet-001')
          assert r.status_code == 200
          print('PASS: get wallet')
          r = requests.post(f'{BASE}/wallets/wallet-001/transactions', json={'type':'credit','amount':100.0})
          assert r.status_code == 201
          print('PASS: credit')
          r = requests.get(f'{BASE}/wallets/wallet-UNKNOWN')
          assert r.status_code == 404
          print('PASS: 404 guard')
          print('All integration tests passed!')
          "

  build-and-package:
    name: "Build and Package"
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - uses: actions/checkout@v4

      - name: Package artefact
        run: |
          mkdir -p dist
          cp app.py requirements.txt dist/
          find dist -type f -exec sha256sum {} \; > SHA256SUMS.txt
          zip -r wallet-transactions-build.zip dist/ SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: wallet-transactions-build
          path: |
            wallet-transactions-build.zip
            SHA256SUMS.txt
